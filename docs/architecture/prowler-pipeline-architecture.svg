<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 1.5; rx: 10; }
      .title { font: 600 14px Arial, sans-serif; fill: #111827; }
      .label { font: 12px Arial, sans-serif; fill: #111827; }
      .arrow { stroke: #111827; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 6 4; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111827" />
    </marker>
  </defs>

  <!-- Top row -->
  <rect class="box" x="40" y="40" width="160" height="60" />
  <text class="title" x="60" y="75">Engineer</text>

  <rect class="box" x="240" y="40" width="180" height="60" />
  <text class="title" x="258" y="75">Prowler UI</text>

  <rect class="box" x="460" y="40" width="180" height="60" />
  <text class="title" x="478" y="75">Prowler API</text>

  <rect class="box" x="680" y="40" width="220" height="60" />
  <text class="title" x="700" y="75">GitHub Actions</text>
  <text class="label" x="700" y="92">scan-cis.yml</text>

  <rect class="box" x="940" y="40" width="200" height="60" />
  <text class="title" x="960" y="75">Terraform apply</text>
  <text class="label" x="960" y="92">vuln/remediate</text>

  <rect class="box" x="1180" y="40" width="180" height="60" />
  <text class="title" x="1200" y="75">AWS Resources</text>

  <!-- Bottom row -->
  <rect class="box" x="680" y="160" width="220" height="60" />
  <text class="title" x="700" y="195">Prowler CLI</text>
  <text class="label" x="700" y="212">CIS 1.4 / ISMS-P</text>

  <rect class="box" x="940" y="160" width="200" height="60" />
  <text class="title" x="960" y="195">Scan Artifacts</text>
  <text class="label" x="960" y="212">ASFF / JSON</text>

  <rect class="box" x="1180" y="160" width="180" height="60" />
  <text class="title" x="1200" y="195">Pipeline Publish</text>
  <text class="label" x="1200" y="212">summary payload</text>

  <rect class="box" x="460" y="160" width="180" height="60" />
  <text class="title" x="480" y="195">Remediation PR</text>

  <rect class="box" x="460" y="260" width="180" height="60" />
  <text class="title" x="480" y="295">Apply on Merge</text>
  <text class="label" x="480" y="312">apply-on-merge.yml</text>

  <rect class="box" x="680" y="260" width="220" height="60" />
  <text class="title" x="700" y="295">Rescan</text>
  <text class="label" x="700" y="312">rescan-after-apply.yml</text>

  <!-- Arrows -->
  <line class="arrow" x1="200" y1="70" x2="240" y2="70" />
  <line class="arrow" x1="420" y1="70" x2="460" y2="70" />
  <line class="arrow" x1="640" y1="70" x2="680" y2="70" />
  <line class="arrow" x1="900" y1="70" x2="940" y2="70" />
  <line class="arrow" x1="1140" y1="70" x2="1180" y2="70" />

  <line class="arrow" x1="790" y1="100" x2="790" y2="160" />
  <line class="arrow" x1="900" y1="190" x2="940" y2="190" />
  <line class="arrow" x1="1140" y1="190" x2="1180" y2="190" />
  <line class="arrow" x1="1180" y1="190" x2="640" y2="190" />
  <line class="arrow dashed" x1="1180" y1="190" x2="460" y2="190" />

  <line class="arrow" x1="550" y1="220" x2="550" y2="260" />
  <line class="arrow" x1="640" y1="290" x2="680" y2="290" />
  <line class="arrow" x1="790" y1="320" x2="790" y2="160" />
</svg>
